<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boy MC Scene</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  height: 100vh;
  background: #d0f0fd;
}

/* Fade Overlay */
.fade {
  position: fixed;
  inset: 0;
  background: black;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
  z-index: 10;
}

/* Background */
.bg {
  position: fixed;
  inset: 0;
  background-position: center top;
  background-size: cover;
  background-repeat: no-repeat;
  background-color: #d0f0fd;
  z-index: 0;
  transition: background-image 0.6s ease;
}

.character-container {
  position: fixed;
  bottom: -2%;
  left: 50%;
  transform: translateX(-50%);
  width: 50%;
  height: 100vh;   /* changed from 130vh */
  overflow: hidden;
  z-index: 2;
}

.character {
  position: absolute;
  bottom: -30%;
  width: 100%;
  height: auto;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
}

/* Textbox */
.textbox {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 880px;
  min-height: 120px;   /* instead of fixed height */
  padding: 18px 22px 28px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 40%, rgba(255,255,255,0.08) 100%),
    radial-gradient(rgba(255,255,255,0.18) 1px, transparent 1px),
    rgba(200,230,255,0.95);
  background-size: 100% 100%, 6px 6px, auto;
  border-radius: 18px;
  box-shadow: 0 0 25px rgba(100,180,230,0.5);
  z-index: 3;
  display: none;
  color: #0655a3;
  font-weight: 600;
  font-size: 0.95rem;
  border: 2px solid #7ec0ee;
  line-height: 1.45;
  overflow-wrap: break-word;
}

/* Namebox */
.namebox {
  position: absolute;
  top: -32px;
  left: 18px;
  background: rgba(173,216,230,0.95);
  padding: 6px 14px;
  border-radius: 10px;
  font-weight: 800;
  font-size: 1rem;
  border: 1px solid #87cefa;
}

/* Cursor animation */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: #0655a3;
  margin-left: 2px;
  animation: blink 0.8s steps(1) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.letter { -webkit-text-stroke: 0.4px white; }

/* Choices */
.choices {
  position: fixed;
  bottom: 180px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 480px;
  display: none;
  flex-direction: column;
  gap: 10px;
  z-index: 20;
}
.choice {
  background: rgba(220,235,255,0.95);
  border: 2px solid #7ec0ee;
  padding: 10px;
  border-radius: 14px;
  font-weight: 700;
  color: #0655a3;
  text-align: center;
  cursor: pointer;
  transition: transform 0.25s ease;
}
.choice:hover { transform: scale(1.03); }

/* Hint button */
.hint-btn {
  position: absolute;
  bottom: 8px;
  right: 12px;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: #7ec0ee;
  color: white;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  transform: scale(0.6);
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.hint-btn.show {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

/* Hint modal */
.hint-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 30;
}
.hint-box {
  background: rgba(220,235,255,0.97);
  border: 2px solid #7ec0ee;
  border-radius: 18px;
  padding: 22px;
  width: 85%;
  max-width: 480px;
  color: #0655a3;
  font-weight: 600;
}
.hint-box button {
  margin-top: 14px;
  padding: 6px 14px;
  border-radius: 10px;
  border: none;
  background: #7ec0ee;
  color: white;
  font-weight: 700;
  cursor: pointer;
}

/* Smooth text appearance */
.textbox, .character { will-change: opacity, transform; }

/* Dark mode */
body.dark-mode { background: linear-gradient(180deg,#1f1f2f,#2b2b45); color:#f0dfff; }
body.dark-mode .nav-btn { background:#593c7f; color:#c484ff; border:2px solid #c484ff; }

/* --- MEDIA QUERIES FOR PHONES --- */
@media (max-width: 480px) {
  .textbox { font-size: 0.85rem; padding: 16px 18px 24px; }
  .namebox { font-size: 0.9rem; top: -28px; left: 14px; padding: 5px 12px; }
  .choices { bottom: 140px; gap: 8px; }
  .choice { padding: 8px; font-size: 0.9rem; }
  .hint-btn { bottom: 6px; right: 8px; width: 24px; height: 24px; }
}
</style>
</head>
<script src="global.js"></script>
<body>

<div class="fade" id="fade"></div>
<div class="bg" id="bg"></div>

<div class="character-container">
  <img class="character" id="character" src="assets/characters/eng.png">
</div>

<div class="choices" id="choices"></div>

<div class="textbox" id="textbox">
  <div class="namebox" id="namebox"></div>
  <div id="text-content"></div>
  <div class="hint-btn" id="hintBtn">!</div>
</div>

<div class="hint-modal" id="hintModal">
  <div class="hint-box">
    <p>Choices affect relationship routes, scenes, and endings. Some options unlock content later — others quietly lock it.</p>
    <button id="closeHint">Okay</button>
  </div>
</div>

<script>
// Same JS logic as original; no changes needed
const mcName = localStorage.getItem("playerName") || "MC";
const bg = document.getElementById("bg");
const fade = document.getElementById("fade");
const textbox = document.getElementById("textbox");
const textContent = document.getElementById("text-content");
const namebox = document.getElementById("namebox");
const choicesBox = document.getElementById("choices");
const character = document.getElementById("character");
const hintBtn = document.getElementById("hintBtn");
const hintModal = document.getElementById("hintModal");
const closeHint = document.getElementById("closeHint");

let currentLine = 0, typing = false, index = 0, interval, autoTimer, inChoice = false, modalOpen = false;

function setBackground(src) { fade.style.opacity = 1; setTimeout(() => { bg.style.backgroundImage = `url(${src})`; fade.style.opacity = 0; }, 600); }

function typeLine(text,speed=26){
  clearInterval(interval); clearTimeout(autoTimer); typing=true; index=0;
  textContent.innerHTML=""; const cursor=document.createElement("span"); cursor.className="cursor"; textContent.appendChild(cursor);
  interval=setInterval(()=>{
    if(index<text.length){
      const span=document.createElement("span"); span.textContent=text[index++]; span.className="letter"; textContent.insertBefore(span,cursor);
    } else { clearInterval(interval); typing=false; autoTimer=setTimeout(()=>{ if(!inChoice&&!modalOpen){currentLine++; showNext();} },1200);}
  },speed);
}

textbox.addEventListener("click",()=>{ if(typing){clearInterval(interval); textContent.textContent=script[currentLine].text; typing=false; return;} if(!inChoice&&!modalOpen){clearTimeout(autoTimer); currentLine++; showNext();} });

hintBtn.onclick=()=>{ modalOpen=true; hintModal.style.display="flex"; };
closeHint.onclick=()=>{ modalOpen=false; hintModal.style.display="none"; };

function showChoices(options){
  inChoice=true;
  hintBtn.classList.add("show");
  choicesBox.innerHTML="";
  choicesBox.style.display="flex";
  options.forEach(opt=>{
    const btn=document.createElement("div"); btn.className="choice"; btn.textContent=opt.text;
    btn.onclick=()=>{ inChoice=false; hintBtn.classList.remove("show"); choicesBox.style.display="none"; currentLine++; opt.callback(); };
    choicesBox.appendChild(btn);
  });
}

const script=[
  { bg:"assets/backgrounds/bedroombg.webp", auto:true },
  { name:mcName, text:"…Great. I’m awake." },
  { name:mcName, text:"Another day of consciousness. Thrilling." },
  { name:mcName, text:"If I skip school, future me suffers." },
  { name:mcName, text:"But if I don't skip school, present me suffers." },
  { name:mcName, text:"And unfortunately, future me and present me are both me." },
  { name:mcName, text:"Whatever. Alright. Get up. Hate everything later." },
  { bg:"assets/backgrounds/hsbuildingfront.webp", auto:true },
  { char:true, name:"English", text:"Hey! You left me behind again!" },
  { name:mcName, text:"(Oh. It's English. My friend through thick and thin, though she can be a little overdramatic sometimes.)" },
  { name:mcName, text:"(Like now.)" },
  { name:"English", text:"Well? What do you have to say for yourself, mister?", choice:true }
];

function showNext(){
  if(currentLine>=script.length) return;
  const line=script[currentLine];
  if(line.bg) setBackground(line.bg);
  if(line.char!==undefined) character.style.opacity=line.char?1:0;
  if(line.auto&&!line.text){ setTimeout(()=>{ currentLine++; showNext(); },700); return; }
  if(line.text){ textbox.style.display="block"; namebox.textContent=line.name||""; typeLine(line.text); }
  if(line.choice){ clearTimeout(autoTimer); setTimeout(()=>{ showChoices([ { text:"Apologize", callback:showNext }, { text:"Stay silent", callback:showNext }, { text:"Snark.", callback:showNext } ]); },700);}
}

setBackground("assets/backgrounds/bedroombg.webp");
showNext();
</script>
</body>
</html>
