<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings</title>
<link rel="icon" type="image/webp" href="/favicon.webp">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --pink-1:#ffdbe9;
  --pink-2:#ffc0dd;
  --accent:#ff4c94;
  --panel:#ff6aa8;
  --panel-deep:#ff3e86;
}

/* ===== BACKGROUND (matches About page) ===== */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle, rgba(255,255,255,0.75) 0 5px, transparent 6px),
    linear-gradient(180deg,var(--pink-1),#ffeaf3);
  background-size:28px 28px, auto;
  animation: moveDots 16s linear infinite;
  overflow-x:hidden;
}

@keyframes moveDots{
  0% { background-position:0 0, 0 0; }
  100% { background-position:140px 140px, 0 0; }
}

/* ===== SIDEBAR (like Subject page) ===== */
.sidebar{
  position: fixed;
  left: 0;
  top: 0;
  width: 210px;
  height: 100vh;
  background: #ffb8d1cc;
  backdrop-filter: blur(4px);
  padding-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 4px 0 12px rgba(0,0,0,0.1);
  border-top-right-radius: 40px;
  border-bottom-right-radius: 40px;
}

.nav-btn{
  width:150px;
  padding:12px;
  margin:10px 0;
  border-radius:20px;
  background:#ffd4e6;
  text-align:center;
  font-weight:600;
  color:var(--accent);
  border:2px solid var(--accent);
  cursor:pointer;
  transition:0.25s ease;
  text-decoration:none;
}

.nav-btn:hover{
  transform:scale(1.07);
  background:var(--accent);
  color:white;
}

/* ===== MAIN CONTENT ===== */
.content{
  margin-left:230px;
  padding:40px;
}

.settings-panel{
  max-width:800px;
  margin:auto;
  padding:40px;
  border-radius:24px;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px);
  border:3px solid var(--accent);
  box-shadow:0 12px 25px rgba(255,120,180,0.3);
}

h1{
  text-align:center;
  color:var(--accent);
  margin-bottom:30px;
}

.setting{
  margin-bottom:28px;
}

label{
  font-weight:600;
  color:var(--accent);
  display:block;
  margin-bottom:8px;
}

/* ===== SLIDERS ===== */
input[type="range"]{
  width:100%;
  accent-color: var(--accent);
}

/* ===== TOGGLE ===== */
.switch{
  position: relative;
  display:inline-block;
  width:50px;
  height:28px;
}

.switch input{ opacity:0; width:0; height:0; }

.slider{
  position:absolute;
  cursor:pointer;
  inset:0;
  background:#ffc0dd;
  border-radius:28px;
  transition:0.3s;
}

.slider:before{
  content:"";
  position:absolute;
  height:22px;
  width:22px;
  left:3px;
  bottom:3px;
  background:white;
  border-radius:50%;
  transition:0.3s;
}

input:checked + .slider{
  background:var(--accent);
}

input:checked + .slider:before{
  transform:translateX(22px);
}

/* ===== BUTTONS ===== */
.btn{
  padding:12px 24px;
  border-radius:18px;
  border:2px solid var(--accent);
  background:var(--pink-2);
  color:var(--accent);
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
  margin-right:10px;
}

.btn:hover{
  background:var(--accent);
  color:white;
  transform:translateY(-3px);
}
</style>
</head>

<body>

<div class="sidebar">
  <a href="index.html" class="nav-btn">Home</a>
  <a href="about.html" class="nav-btn">About</a>
  <a href="play.html" class="nav-btn">PLAY!!</a>
  <a href="notebook.html" class="nav-btn">Notebook</a>
  <a href="gallery.html" class="nav-btn">Gallery</a>
  <a href="settings.html" class="nav-btn">Settings</a>
</div>

<div class="content">
  <div class="settings-panel">
    <h1>Game Settings</h1>

    <div class="setting">
      <label>BGM Volume</label>
      <input type="range" id="bgmVolume" min="0" max="100">
    </div>

    <div class="setting">
      <label>SFX Volume</label>
      <input type="range" id="sfxVolume" min="0" max="100">
    </div>

    <div class="setting">
      <label>Voice Volume</label>
      <input type="range" id="voiceVolume" min="0" max="100">
    </div>

    <div class="setting">
      <label>Text Speed</label>
      <input type="range" id="textSpeed" min="1" max="100">
    </div>

    <div class="setting">
      <label>Auto Mode Speed</label>
      <input type="range" id="autoSpeed" min="1" max="100">
    </div>

    <div class="setting">
      <label>Font Size</label>
      <input type="range" id="fontSize" min="14" max="32">
    </div>

    <div class="setting">
      <label>Skip Unread Text</label>
      <label class="switch">
        <input type="checkbox" id="skipUnread">
        <span class="slider"></span>
      </label>
    </div>

    <div class="setting">
      <label>Fullscreen Mode</label>
      <label class="switch">
        <input type="checkbox" id="fullscreen">
        <span class="slider"></span>
      </label>
    </div>

    <button class="btn" onclick="saveSettings()">Save</button>
    <button class="btn" onclick="resetSettings()">Reset</button>

  </div>
</div>

<script>
const defaultSettings = {
  bgmVolume:70,
  sfxVolume:70,
  voiceVolume:70,
  textSpeed:50,
  autoSpeed:50,
  fontSize:18,
  skipUnread:false,
  fullscreen:false
};

function loadSettings(){
  const saved = JSON.parse(localStorage.getItem("vnSettings")) || defaultSettings;

  for(let key in saved){
    const el = document.getElementById(key);
    if(!el) continue;

    if(el.type === "checkbox"){
      el.checked = saved[key];
    } else {
      el.value = saved[key];
    }
  }

  applySettings(saved);
}

function saveSettings(){
  const settings = {};
  Object.keys(defaultSettings).forEach(key=>{
    const el = document.getElementById(key);
    settings[key] = el.type === "checkbox" ? el.checked : parseInt(el.value);
  });

  localStorage.setItem("vnSettings", JSON.stringify(settings));
  applySettings(settings);
  alert("Settings saved!");
}

function resetSettings(){
  localStorage.setItem("vnSettings", JSON.stringify(defaultSettings));
  loadSettings();
}

function applySettings(settings){

  // Apply font size globally
  document.documentElement.style.setProperty("--vnFontSize", settings.fontSize + "px");

  // Fullscreen
  if(settings.fullscreen){
    document.documentElement.requestFullscreen().catch(()=>{});
  }

}

window.onload = loadSettings;
</script>

</body>
</html>
