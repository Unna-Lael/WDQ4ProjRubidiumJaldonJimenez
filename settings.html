<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings</title>
<link rel="icon" type="image/webp" href="/favicon.webp">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --pink-1:#ffdbe9;
  --pink-2:#ffc0dd;
  --accent:#ff4c94;

  --dark-bg:#1f1f2f;
  --dark-panel:#2b2b45;
  --dark-accent:#c484ff;

  --vnFontSize:18px;
}

/* ===== BACKGROUND ===== */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  font-size:var(--vnFontSize);
  background:
    radial-gradient(circle, rgba(255,255,255,0.75) 0 5px, transparent 6px),
    linear-gradient(180deg,var(--pink-1),#ffeaf3);
  background-size:28px 28px, auto;
  animation: moveDots 16s linear infinite;
  transition: all .3s ease;
}

body.dark-mode{
  background:
    radial-gradient(circle, rgba(200,180,255,0.3) 0 5px, transparent 6px),
    linear-gradient(180deg,var(--dark-bg),var(--dark-panel));
  color:#f0dfff;
}

@keyframes moveDots{
  0% { background-position:0 0, 0 0; }
  100% { background-position:140px 140px, 0 0; }
}

/* ===== SIDEBAR ===== */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:210px;
  height:100vh;
  background:#ffb8d1cc;
  backdrop-filter:blur(4px);
  padding-top:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  border-top-right-radius:40px;
  border-bottom-right-radius:40px;
}

body.dark-mode .sidebar{
  background:rgba(60,50,90,0.7);
}

.nav-btn{
  width:150px;
  padding:12px;
  margin:10px 0;
  border-radius:20px;
  background:#ffd4e6;
  text-align:center;
  font-weight:600;
  color:var(--accent);
  border:2px solid var(--accent);
  text-decoration:none;
  transition:.25s ease;
}

body.dark-mode .nav-btn{
  background:#593c7f;
  color:var(--dark-accent);
  border:2px solid var(--dark-accent);
}

.nav-btn:hover{
  transform:scale(1.07);
  background:var(--accent);
  color:white;
}

/* ===== MAIN ===== */
.content{
  margin-left:230px;
  padding:40px;
}

.settings-panel{
  max-width:800px;
  margin:auto;
  padding:40px;
  border-radius:24px;
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(8px);
  border:3px solid var(--accent);
}

body.dark-mode .settings-panel{
  background:rgba(40,30,70,0.7);
  border:3px solid var(--dark-accent);
}

h1{
  text-align:center;
  color:var(--accent);
}

body.dark-mode h1{ color:var(--dark-accent); }

.setting{ margin-bottom:28px; }

label{
  font-weight:600;
  color:var(--accent);
}

body.dark-mode label{ color:var(--dark-accent); }

input[type="range"]{
  width:100%;
  accent-color:var(--accent);
}

body.dark-mode input[type="range"]{
  accent-color:var(--dark-accent);
}

/* ===== DEMO BOX ===== */
.demo-box{
  margin-top:10px;
  padding:12px 16px;
  border-radius:14px;
  background:rgba(255,255,255,0.6);
  border:1px solid var(--accent);
  min-height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  color:var(--accent);

  opacity:0;
  transform:translateY(10px);
  pointer-events:none;
  transition:all .35s ease;
}

.demo-box.active{
  opacity:1;
  transform:translateY(0);
}

body.dark-mode .demo-box{
  background:rgba(60,50,90,0.7);
  border:1px solid var(--dark-accent);
  color:var(--dark-accent);
}
/* ===== AESTHETIC TOGGLE SWITCH ===== */

.toggle{
  position:relative;
  display:inline-block;
  width:58px;
  height:30px;
  margin-top:8px;
}

.toggle input{
  opacity:0;
  width:0;
  height:0;
}

.toggle-slider{
  position:absolute;
  inset:0;
  background:#ffd4e6;
  border-radius:30px;
  cursor:pointer;
  transition:all .3s ease;
  border:2px solid var(--accent);
}

.toggle-slider::before{
  content:"";
  position:absolute;
  height:22px;
  width:22px;
  left:3px;
  top:50%;
  transform:translateY(-50%);
  background:white;
  border-radius:50%;
  transition:all .3s ease;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* WHEN CHECKED */
.toggle input:checked + .toggle-slider{
  background:var(--accent);
}

.toggle input:checked + .toggle-slider::before{
  transform:translate(26px,-50%);
}

/* ===== DARK MODE TOGGLE STYLE ===== */

body.dark-mode .toggle-slider{
  background:#593c7f;
  border:2px solid var(--dark-accent);
}

body.dark-mode .toggle input:checked + .toggle-slider{
  background:var(--dark-accent);
}


</style>
</head>
<body>

<div class="sidebar">
  <a href="index.html" class="nav-btn">Home</a>
  <a href="about.html" class="nav-btn">About</a>
  <a href="play.html" class="nav-btn">PLAY!!</a>
  <a href="notebook.html" class="nav-btn">Notebook</a>
  <a href="gallery.html" class="nav-btn">Gallery</a>
  <a href="settings.html" class="nav-btn">Settings</a>
</div>

<div class="content">
<div class="settings-panel">
<h1>Game Settings</h1>

<div class="setting">
<label>BGM Volume</label>
<input type="range" id="bgmVolume" min="0" max="100">
<div class="demo-box" id="bgmDemo"></div>
</div>

<div class="setting">
<label>SFX Volume</label>
<input type="range" id="sfxVolume" min="0" max="100">
<div class="demo-box" id="sfxDemo"></div>
</div>

<div class="setting">
<label>Voice Volume</label>
<input type="range" id="voiceVolume" min="0" max="100">
<div class="demo-box" id="voiceDemo"></div>
</div>

<div class="setting">
<label>Text Speed</label>
<input type="range" id="textSpeed" min="1" max="100">
<div class="demo-box" id="textSpeedDemo"></div>
</div>

<div class="setting">
<label>Auto Mode Speed</label>
<input type="range" id="autoSpeed" min="1" max="100">
<div class="demo-box" id="autoSpeedDemo"></div>
</div>

<div class="setting">
<label>Font Size</label>
<input type="range" id="fontSize" min="14" max="32">
<div class="demo-box" id="fontDemo">Preview Text</div>
</div>

<div class="setting">
<label>Skip Unread Text</label>
<label class="toggle">
  <input type="checkbox" id="skipUnread">
  <span class="toggle-slider"></span>
</label>
<div class="demo-box" id="skipDemo"></div>
</div>

<div class="setting">
<label>Fullscreen Mode</label>
<label class="toggle">
  <input type="checkbox" id="fullscreen">
  <span class="toggle-slider"></span>
</label>
<div class="demo-box" id="fsDemo"></div>
</div>

<div class="setting">
<label>Dark Mode</label>
<label class="toggle">
  <input type="checkbox" id="darkMode">
  <span class="toggle-slider"></span>
</label>
<div class="demo-box" id="darkDemo"></div>
</div>

</div>
</div>

<script>
const defaultSettings={
  bgmVolume:70,sfxVolume:70,voiceVolume:70,
  textSpeed:50,autoSpeed:50,fontSize:18,
  skipUnread:false,fullscreen:false,darkMode:false
};

let activeDemo=null;
let demoTimer=null;

function showDemo(id){
  if(activeDemo) activeDemo.classList.remove("active");
  const box=document.getElementById(id);
  if(!box) return;
  box.classList.add("active");
  activeDemo=box;
}

function clearDemo(){
  if(demoTimer) clearInterval(demoTimer);
  demoTimer=null;
}

function applySettings(settings){
  document.documentElement.style.setProperty("--vnFontSize",settings.fontSize+"px");
  document.body.classList.toggle("dark-mode",settings.darkMode);

  if(settings.fullscreen && !document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  }
  if(!settings.fullscreen && document.fullscreenElement){
    document.exitFullscreen().catch(()=>{});
  }
}

function updateSetting(id){
  const settings=JSON.parse(localStorage.getItem("vnSettings"))||defaultSettings;
  const el=document.getElementById(id);

  settings[id]=el.type==="checkbox"?el.checked:parseInt(el.value);
  localStorage.setItem("vnSettings",JSON.stringify(settings));
  applySettings(settings);

  clearDemo();

  if(id==="bgmVolume"){
    showDemo("bgmDemo");
    bgmDemo.textContent="BGM Volume: "+settings.bgmVolume;
  }

  if(id==="sfxVolume"){
    showDemo("sfxDemo");
    sfxDemo.textContent="SFX Volume: "+settings.sfxVolume;
  }

  if(id==="voiceVolume"){
    showDemo("voiceDemo");
    voiceDemo.textContent="Voice Volume: "+settings.voiceVolume;
  }

  if(id==="fontSize"){
    showDemo("fontDemo");
    fontDemo.style.fontSize=settings.fontSize+"px";
    fontDemo.textContent="Preview Text Size";
  }

  if(id==="skipUnread"){
    showDemo("skipDemo");
    skipDemo.textContent=settings.skipUnread?
      "Skipping unread text ON":"Skipping unread text OFF";
  }

  if(id==="darkMode"){
    showDemo("darkDemo");
    darkDemo.textContent=settings.darkMode?
      "Dark mode enabled":"Dark mode disabled";
  }

  if(id==="fullscreen"){
    showDemo("fsDemo");
    fsDemo.textContent=settings.fullscreen?
      "Fullscreen enabled":"Fullscreen disabled";
  }

  if(id==="textSpeed"){
    showDemo("textSpeedDemo");
    const msgs=["Hello!","If you are seeing this, you are adjusting text speed!","I hope you like the game!"];
    let i=0;
    demoTimer=setInterval(()=>{
      textSpeedDemo.textContent=msgs[i++];
      if(i>=msgs.length) clearDemo();
    },Math.max(60,600-settings.textSpeed*5));
  }

  if(id==="autoSpeed"){
    showDemo("autoSpeedDemo");
    const msgs=["Auto mode preview line 1","Auto mode preview line 2","Auto mode preview line 3"];
    let i=0;
    demoTimer=setInterval(()=>{
      autoSpeedDemo.textContent=msgs[i];
      i=(i+1)%msgs.length;
    },Math.max(60,700-settings.autoSpeed*6));
  }
}

["bgmVolume","sfxVolume","voiceVolume","textSpeed","autoSpeed","fontSize","skipUnread","fullscreen","darkMode"]
.forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener(el.type==="checkbox"?"change":"input",()=>updateSetting(id));
});

window.onload=()=>{
  const saved=JSON.parse(localStorage.getItem("vnSettings"))||defaultSettings;
  for(let key in saved){
    const el=document.getElementById(key);
    if(!el) continue;
    el.type==="checkbox"?el.checked=saved[key]:el.value=saved[key];
  }
  applySettings(saved);
};
</script>

</body>
</html>
