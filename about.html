<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>About the Game</title>
  <link rel="icon" type="image/webp" href="favicon.webp">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet">

  <style>
    :root {
      --pink-1: #ffdbe9;
      --pink-2: #ffc0dd;
      --accent: #ff4c94;
      --panel: #ff6aa8;
      --panel-deep: #ff3e86;
      --yellow: #ffe8a3;
    }

    /* PAGE BACKGROUND */
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background:
        radial-gradient(circle, rgba(255,255,255,0.75) 0 5px, transparent 6px),
        linear-gradient(180deg, var(--pink-1), #ffeaf3);
      background-size: 28px 28px, auto;
      animation: moveDots 16s linear infinite;
      overflow-x: hidden;
      padding-bottom: 60px;
    }

    @keyframes moveDots {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 140px 140px, 0 0; }
    }

    /* HEADER + NAV */
    .header-wrap {
      width: 95%;
      max-width: 1100px;
      margin: 20px auto;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(6px);
      border-radius: 24px;
      border: 2px solid rgba(255,140,180,0.3);
      box-shadow: 0 6px 18px rgba(255,140,180,0.25);
    }
    .header { text-align: center; padding: 20px 0 10px; }
    .header h1 {
      font-size: 40px; margin: 0; color: var(--accent);
      text-shadow: 4px 4px #ffbdd2; font-weight: 800;
    }

    .nav-box {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 12px; padding: 15px;
    }
    .nav-btn {
      padding: 8px 16px; background: #ffd4e6; border-radius: 12px;
      border: 2px solid var(--accent); font-weight: 700; color: var(--accent);
      cursor: pointer; transition: 0.25s; text-decoration: none;
    }
    .nav-btn:hover { background: var(--accent); color: white; transform: translateY(-2px); }

    /* MAIN PANEL */
    .stage { width: 95%; max-width: 1100px; margin: 20px auto; }
    .panel {
      border: 6px solid var(--panel-deep);
      background: linear-gradient(180deg, #ff8fbd, #ff629d);
      border-radius: 16px; padding: 20px; text-align: center;
    }
    .scroll-area {
      width: 100%; max-height: 400px; overflow-y: auto;
      font-family: 'Pacifico', cursive; color: var(--yellow);
    }
    .panel-text { font-family: 'Poppins', sans-serif; font-size: 18px; color: white; text-align: left; }

    /* RATING SYSTEM */
    .rating-stars { font-size: 30px; margin: 10px 0; cursor: pointer; color: white; }
    .star.selected { color: var(--yellow); text-shadow: 0 0 5px orange; }

    /* FEEDBACK FORM */
    .feedback-container {
      width: 95%; max-width: 600px; margin: 40px auto; padding: 25px;
      border-radius: 20px; background: rgba(255, 210, 230, 0.6);
      backdrop-filter: blur(8px); border: 2px solid var(--accent);
    }
    .feedback-section input, .feedback-section textarea {
      width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px;
      border: 2px solid var(--accent); box-sizing: border-box;
    }
    .feedback-section button {
      background: var(--pink-2); color: var(--accent); border: 2px solid var(--accent);
      padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%;
    }
    .feedback-section button:hover { background: var(--accent); color: white; }

    /* COMMENTS DISPLAY */
    .comments-display { margin-top: 20px; }
    .comment-box {
      background: linear-gradient(120deg, #ffbdd2, #ff8fb3);
      border: 2px solid var(--accent); border-radius: 12px;
      padding: 15px; margin-bottom: 10px; color: #fff; position: relative;
    }
    .comment-actions { margin-top: 10px; display: flex; gap: 10px; }
    .action-btn {
      background: rgba(255,255,255,0.3); border: none; padding: 5px 10px;
      border-radius: 5px; color: white; cursor: pointer; font-size: 12px;
    }
    .action-btn:hover { background: white; color: var(--accent); }

    /* DARK MODE OVERRIDES */
    body.dark-mode { background: #2b2b45; color: #f0dfff; }
    body.dark-mode .feedback-container { background: rgba(60,50,90,0.8); }
    body.dark-mode .comment-box { background: #593c7f; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>
